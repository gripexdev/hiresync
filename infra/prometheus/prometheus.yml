global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'hiresync-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['hiresync-backend:8080']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['hiresync-rabbitmq:15692']

  - job_name: 'postgres'
    static_configs:
      - targets: ['hiresync-postgres-exporter:9187']

name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'hiresync/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hiresync/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Type-check & build (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hiresync
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: hiresync/package-lock.json

      # npm ci is intentionally not used here: the committed lockfile is
      # missing some optional @esbuild/* platform packages, which makes
      # `npm ci` fail. Same workaround as hiresync/Dockerfile.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      # GitHub's ubuntu-latest runner ships Chrome pre-installed and sets
      # CHROME_BIN already, so karma-chrome-launcher finds it automatically.
      # ChromeHeadlessCI (defined in karma.conf.js) adds --no-sandbox, needed
      # because the runner — like our local Docker test runs — executes as root.
      - name: Unit tests (Karma + Jasmine)
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI --code-coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: hiresync/coverage/hiresync
          retention-days: 7

      - name: Production build
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hiresync/dist/hiresync/browser
          retention-days: 7

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image (smoke test, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: ./hiresync
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hiresync
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

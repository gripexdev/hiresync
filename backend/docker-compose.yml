version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiresync-postgres
    environment:
      POSTGRES_DB:       hiresync
      POSTGRES_USER:     hiresync
      POSTGRES_PASSWORD: hiresync123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hiresync-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hiresync
      RABBITMQ_DEFAULT_PASS: hiresync123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FlareSolverr (Cloudflare JS-challenge bypass for scrapers) ───────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: hiresync-flaresolverr
    environment:
      LOG_LEVEL: warn
    ports:
      - "8191:8191"
    restart: on-failure

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build: .
    container_name: hiresync-backend
    ports:
      - "8080:8080"
    environment:
      # Use container names for internal Docker networking
      DB_URL:             jdbc:postgresql://hiresync-postgres:5432/hiresync
      DB_USER:            hiresync
      DB_PASS:            hiresync123
      RABBITMQ_HOST:      hiresync-rabbitmq
      RABBITMQ_PORT:      5672
      RABBITMQ_USER:      hiresync
      RABBITMQ_PASS:      hiresync123
      # Secrets — read from backend/.env (copy .env.example → .env and fill in)
      JWT_SECRET:         ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL:   ${OPENROUTER_MODEL:-google/gemma-4-31b-it:free}
      FLARESOLVERR_URL:   http://hiresync-flaresolverr:8191
    volumes:
      - cv_uploads:/app/uploads/cvs
      - playwright_cache:/root/.cache/ms-playwright   # persists Chromium download across restarts
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    restart: on-failure

volumes:
  postgres_data:
  cv_uploads:
  playwright_cache:

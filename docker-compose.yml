services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiresync-postgres
    environment:
      POSTGRES_DB:       hiresync
      POSTGRES_USER:     hiresync
      POSTGRES_PASSWORD: hiresync123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (custom image: rabbitmq_prometheus plugin pre-enabled) ──────
  rabbitmq:
    build: ./infra/rabbitmq
    container_name: hiresync-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hiresync
      RABBITMQ_DEFAULT_PASS: hiresync123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
      - "15692:15692"  # Prometheus metrics
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FlareSolverr (Cloudflare JS-challenge bypass for scrapers) ───────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: hiresync-flaresolverr
    environment:
      LOG_LEVEL: warn
    ports:
      - "8191:8191"
    restart: on-failure

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: hiresync-backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      # Use container names for internal Docker networking
      DB_URL:             jdbc:postgresql://hiresync-postgres:5432/hiresync
      DB_USER:            hiresync
      DB_PASS:            hiresync123
      RABBITMQ_HOST:      hiresync-rabbitmq
      RABBITMQ_PORT:      5672
      RABBITMQ_USER:      hiresync
      RABBITMQ_PASS:      hiresync123
      OPENROUTER_MODEL:   ${OPENROUTER_MODEL:-google/gemma-4-31b-it:free}
      # Exposes /actuator/prometheus for Prometheus to scrape (see infra/prometheus/prometheus.yml)
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_METRICS_TAGS_APPLICATION: hiresync-backend
      # Other secrets (JWT_SECRET, GEMINI_API_KEY, GROQ_API_KEY, OPENROUTER_API_KEY)
      # come from env_file: ./backend/.env below — do not redeclare them here,
      # explicit `environment:` entries override env_file and would blank them out.
      FLARESOLVERR_URL:   http://hiresync-flaresolverr:8191
    volumes:
      - cv_uploads:/app/uploads/cvs
      - playwright_cache:/root/.cache/ms-playwright   # persists Chromium download across restarts
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    restart: on-failure

  # ── Angular Frontend (built + served by Nginx, reverse-proxies /api,/ws) ──
  frontend:
    build: ./hiresync
    container_name: hiresync-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: on-failure

  # ── Postgres exporter (DB metrics for Prometheus) ─────────────────────────
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: hiresync-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://hiresync:hiresync123@hiresync-postgres:5432/hiresync?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hiresync-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - rabbitmq
      - postgres-exporter
    restart: on-failure

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: hiresync-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: on-failure

volumes:
  postgres_data:
    name: backend_postgres_data
    external: true
  cv_uploads:
    name: backend_cv_uploads
    external: true
  playwright_cache:
    name: backend_playwright_cache
    external: true
  prometheus_data:
  grafana_data:
